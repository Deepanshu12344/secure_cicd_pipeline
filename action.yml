name: "Secure Pipeline Action"
description: "Runs the capci_cd security pipeline against the checked-out repository"

inputs:
  python-version:
    required: false
    default: "3.9"

  target-path:
    required: false
    default: "."

  dashboard-url:
    required: false
    default: "https://secure-cicd-pipeline.onrender.com"

  dashboard-project-id:
    required: false
    default: ""

  risk-threshold:
    required: false
    default: "80"

  fail-on-critical:
    required: false
    default: "true"

  install-external-tools:
    required: false
    default: "false"

outputs:
  report-json-path:
    value: ${{ steps.export.outputs.report_json_path }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        set -e
        pip install -r "${{ github.action_path }}/capci_cd/requirements.txt"

    - name: Install external scanners
      if: ${{ inputs.install-external-tools == 'true' }}
      shell: bash
      run: |
        set -e
        pip install pip-audit semgrep

    - name: Run pipeline
      id: run_pipeline
      shell: bash
      working-directory: ${{ inputs.target-path }}
      env:
        CICD_RISK_THRESHOLD: ${{ inputs.risk-threshold }}
        CICD_FAIL_ON_CRITICAL: ${{ inputs.fail-on-critical }}
      run: |
        set +e
        python "${{ github.action_path }}/capci_cd/run_secure_pipeline.py"
        echo "pipeline_exit_code=$?" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Copy report
      id: export
      shell: bash
      run: |
        set -e
        mkdir -p "${{ github.workspace }}/security-reports"

        cp "${{ github.action_path }}/capci_cd/reports/report.json" \
           "${{ github.workspace }}/security-reports/report.json"

        echo "report_json_path=${{ github.workspace }}/security-reports/report.json" >> "$GITHUB_OUTPUT"

    - name: Build unified scan report
      id: build_report
      shell: bash
      env:
        REPORT_PATH: ${{ steps.export.outputs.report_json_path }}
      run: |
        set -e
        mkdir -p "${{ github.workspace }}/.run-logs"
        python - <<'PY'
        import json
        import os
        from pathlib import Path
        from reportlab.lib.pagesizes import letter
        from reportlab.pdfgen import canvas

        report_path = Path(os.environ["REPORT_PATH"])
        with report_path.open("r", encoding="utf-8") as handle:
            base = json.load(handle)

        summary = base.get("summary") or {}
        enriched = {
            "repository": os.getenv("GITHUB_REPOSITORY", ""),
            "commit": os.getenv("GITHUB_SHA", ""),
            "actor": os.getenv("GITHUB_ACTOR", ""),
            "runId": os.getenv("GITHUB_RUN_ID", ""),
            "branch": os.getenv("GITHUB_REF_NAME", ""),
            "workflow": os.getenv("GITHUB_WORKFLOW", ""),
            "riskScore": int(base.get("overall_risk_score") or 0),
            "critical": int(summary.get("critical_count") or 0),
            "high": int(summary.get("high_count") or 0),
            "medium": int(summary.get("medium_count") or 0),
            "low": int(summary.get("low_count") or 0),
            "vulnerabilities": base.get("issues") or [],
            "rawReport": base,
        }

        out_path = Path(os.getenv("GITHUB_WORKSPACE", ".")) / ".run-logs" / "scan-report.json"
        out_path.write_text(json.dumps(enriched, indent=2), encoding="utf-8")
        pdf_path = Path(os.getenv("GITHUB_WORKSPACE", ".")) / ".run-logs" / "scan-report.pdf"
        c = canvas.Canvas(str(pdf_path), pagesize=letter)
        width, height = letter
        y = height - 50
        c.setFont("Helvetica-Bold", 16)
        c.drawString(50, y, "Secure CI/CD Scan Report")
        y -= 30
        c.setFont("Helvetica", 11)
        lines = [
            f"Repository: {enriched['repository']}",
            f"Commit: {enriched['commit']}",
            f"Actor: {enriched['actor']}",
            f"Run ID: {enriched['runId']}",
            f"Branch: {enriched['branch']}",
            f"Workflow: {enriched['workflow']}",
            f"Risk Score: {enriched['riskScore']}",
            f"Critical: {enriched['critical']}",
            f"High: {enriched['high']}",
            f"Medium: {enriched['medium']}",
            f"Low: {enriched['low']}",
        ]
        for line in lines:
            c.drawString(50, y, line)
            y -= 16
        c.showPage()
        c.save()
        print(f"Wrote {out_path} and {pdf_path}")
        PY

    - name: Upload scan results to dashboard
      if: ${{ inputs.dashboard-url != '' }}
      continue-on-error: true
      shell: bash
      env:
        DASHBOARD_URL: ${{ inputs.dashboard-url }}
      run: |
        set -e
        curl -sS -X POST "${DASHBOARD_URL%/}/api/scans/ci-ingest" \
          -F "repository=$GITHUB_REPOSITORY" \
          -F "repositoryUrl=https://github.com/$GITHUB_REPOSITORY" \
          -F "repositoryFullName=$GITHUB_REPOSITORY" \
          -F "commit=$GITHUB_SHA" \
          -F "actor=$GITHUB_ACTOR" \
          -F "runId=$GITHUB_RUN_ID" \
          -F "branch=$GITHUB_REF_NAME" \
          -F "workflow=$GITHUB_WORKFLOW" \
          -F "report=@${GITHUB_WORKSPACE}/.run-logs/scan-report.json" \
          -F "reportPdf=@${GITHUB_WORKSPACE}/.run-logs/scan-report.pdf"

    - name: Enforce gate
      shell: bash
      run: |
        set -e

        REPORT="${{ steps.export.outputs.report_json_path }}"
        EXIT_CODE="${{ steps.run_pipeline.outputs.pipeline_exit_code }}"
        THRESHOLD="${{ inputs.risk-threshold }}"
        FAIL_CRIT="${{ inputs.fail-on-critical }}"

        SCORE=$(python -c "import json; print(json.load(open('$REPORT')).get('overall_risk_score', 0))")
        CRITICAL=$(python -c "import json; print(json.load(open('$REPORT')).get('summary', {}).get('critical_count', 0))")

        echo "Score: $SCORE"
        echo "Critical: $CRITICAL"

        if [ "$FAIL_CRIT" = "true" ] && [ "$CRITICAL" -gt 0 ]; then
          echo "Critical vulnerabilities found."
          exit 1
        fi

        if [ "$SCORE" -ge "$THRESHOLD" ]; then
          echo "Risk score exceeded threshold."
          exit 1
        fi

        if [ "$EXIT_CODE" -ne 0 ]; then
          exit "$EXIT_CODE"
        fi

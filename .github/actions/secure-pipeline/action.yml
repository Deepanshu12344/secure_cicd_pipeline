name: "Secure Pipeline Action"
description: "Runs the capci_cd security pipeline against the checked-out repository"
# sffesf
inputs:
  python-version:
    required: false
    default: "3.9"
  target-path:
    required: false
    default: "."
  risk-threshold:
    required: false
    default: "80"
  fail-on-critical:
    required: false
    default: "true"
  dashboard-url:
    required: false
    default: ""
  dashboard-project-id:
    required: false
    default: ""
  dashboard-api-key:
    required: false
    default: ""
  dashboard-backup-url:
    required: false
    default: ""
  require-dashboard-ingest:
    required: false
    default: "false"

outputs:
  report-json-path:
    value: ${{ steps.export.outputs.report_json_path }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        ACTION_REPO_ROOT="$(cd "${{ github.action_path }}/../../.." && pwd)"
        REQ_FILE="$ACTION_REPO_ROOT/capci_cd/requirements.txt"
        [ -f "$REQ_FILE" ] || { echo "Missing requirements file: $REQ_FILE" >&2; exit 1; }
        python -m pip install --upgrade pip
        python -m pip install -r "$REQ_FILE"

    - name: Run pipeline
      id: run_pipeline
      shell: bash
      run: |
        set +e
        ACTION_REPO_ROOT="$(cd "${{ github.action_path }}/../../.." && pwd)"
        cd "${{ inputs.target-path }}"
        python "$ACTION_REPO_ROOT/capci_cd/run_secure_pipeline.py"
        echo "pipeline_exit_code=$?" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Copy report
      id: export
      shell: bash
      run: |
        set -euo pipefail
        ACTION_REPO_ROOT="$(cd "${{ github.action_path }}/../../.." && pwd)"
        REPORT_SOURCE="$ACTION_REPO_ROOT/capci_cd/reports/report.json"
        DEST_DIR="${{ github.workspace }}/security-reports"
        DEST_FILE="$DEST_DIR/report.json"
        [ -f "$REPORT_SOURCE" ] || { echo "Expected report not found: $REPORT_SOURCE" >&2; exit 1; }
        mkdir -p "$DEST_DIR"
        cp "$REPORT_SOURCE" "$DEST_FILE"
        echo "report_json_path=$DEST_FILE" >> "$GITHUB_OUTPUT"
# rtrttr
    - name: Ingest report to scans endpoint
      shell: bash
      env:
        DASHBOARD_URL: ${{ inputs.dashboard-url }}
        DASHBOARD_BACKUP_URL: ${{ inputs.dashboard-backup-url }}
        DASHBOARD_PROJECT_ID: ${{ inputs.dashboard-project-id }}
        DASHBOARD_API_KEY: ${{ inputs.dashboard-api-key }}
        REQUIRE_DASHBOARD_INGEST: ${{ inputs.require-dashboard-ingest }}
        REPORT_PATH: ${{ steps.export.outputs.report_json_path }}
        REPOSITORY: ${{ github.repository }}
        REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail
        DASHBOARD_URL_TRIMMED="$(echo "${DASHBOARD_URL}" | tr -d "[:space:]")"
        DASHBOARD_BACKUP_URL_TRIMMED="$(echo "${DASHBOARD_BACKUP_URL}" | tr -d "[:space:]")"
        DASHBOARD_API_KEY_TRIMMED="$(echo "${DASHBOARD_API_KEY}" | tr -d "[:space:]")"

        if { [ -z "${DASHBOARD_URL_TRIMMED}" ] && [ -z "${DASHBOARD_BACKUP_URL_TRIMMED}" ]; } || [ -z "${DASHBOARD_API_KEY_TRIMMED}" ]; then
          if [ "${REQUIRE_DASHBOARD_INGEST}" = "true" ]; then
            echo "Missing dashboard url (primary and backup both empty) or dashboard-api-key input. Cannot ingest scan." >&2
            exit 1
          fi
          echo "Dashboard ingest skipped: dashboard url missing (primary and backup) or dashboard-api-key not set."
          exit 0
        fi

        python <<'PY'
        import json
        import os
        import socket
        import sys
        import urllib.error
        import urllib.request
        from urllib.parse import urlparse

        with open(os.environ["REPORT_PATH"], encoding="utf-8") as f:
            report = json.load(f)

        raw_primary = os.environ.get("DASHBOARD_URL", "").strip().strip("'\"")
        raw_backup = os.environ.get("DASHBOARD_BACKUP_URL", "").strip().strip("'\"")
        candidate_urls = [u for u in (raw_primary, raw_backup) if u]
        require_ingest = os.environ.get("REQUIRE_DASHBOARD_INGEST", "false").lower() == "true"
        if not candidate_urls:
            msg = "No dashboard URL candidates provided."
            if require_ingest:
                raise SystemExit(msg)
            print(f"{msg} Skipping dashboard ingest.")
            raise SystemExit(0)

        def normalize_url(u: str) -> str:
            return u if "://" in u else f"https://{u}"

        dashboard_url = normalize_url(candidate_urls[0])
        errors = []
        endpoint = ""
        selected_base_url = ""
        for raw in candidate_urls:
            dashboard_url = normalize_url(raw)
            parsed = urlparse(dashboard_url)
            if parsed.scheme not in ("http", "https") or not parsed.netloc:
                errors.append(f"Invalid DASHBOARD_URL '{dashboard_url}'")
                continue

            host = (parsed.hostname or "").strip()
            if not host:
                errors.append(f"Invalid DASHBOARD_URL '{dashboard_url}' (hostname missing)")
                continue

            try:
                socket.getaddrinfo(host, parsed.port or (443 if parsed.scheme == "https" else 80))
            except socket.gaierror as exc:
                errors.append(
                    f"Host not resolvable '{host}' (from '{dashboard_url}') details: {exc}"
                )
                continue

            selected_base_url = dashboard_url.rstrip("/")
            endpoint = selected_base_url + "/api/scans/ci-ingest"
            break

        if not endpoint:
            msg = (
                "No reachable dashboard URL. "
                + " | ".join(errors)
                + " | Set DASHBOARD_URL (or backup) to stable Render domain."
            )
            if require_ingest:
                raise SystemExit(msg)
            print(f"{msg} Skipping dashboard ingest.")
            raise SystemExit(0)
        payload = {
            "projectId": os.environ.get("DASHBOARD_PROJECT_ID") or None,
            "repositoryUrl": os.environ["REPOSITORY_URL"],
            "repositoryFullName": os.environ["REPOSITORY"],
            "branch": os.environ["REF_NAME"],
            "commitSha": os.environ["COMMIT_SHA"],
            "workflowRunUrl": f"https://github.com/{os.environ['REPOSITORY']}/actions/runs/{os.environ['RUN_ID']}",
            "reportFileName": "report.json",
            "report": report,
        }

        base_headers = {
            "Content-Type": "application/json",
            "x-ci-api-key": os.environ["DASHBOARD_API_KEY"],
        }

        # Only these endpoints create Scan records for /scans page.
        ingest_path_candidates = [
            "/api/scans/ci-ingest",
            "/api/scans/ci-ingest/",
            "/scans/ci-ingest",
            "/scans/ci-ingest/",
        ]

        try:
            health_url = selected_base_url + "/health"
            try:
                with urllib.request.urlopen(health_url, timeout=20) as health_resp:
                    health_body = health_resp.read().decode("utf-8", errors="replace")
                    if getattr(health_resp, "status", 0) >= 400:
                        raise urllib.error.HTTPError(health_url, health_resp.status, "health check failed", health_resp.headers, None)
                    if "Backend is running" not in health_body:
                        print(f"Health check response did not match expected backend marker. URL: {health_url}")
            except Exception as health_exc:
                if require_ingest:
                    raise SystemExit(
                        f"Dashboard URL is reachable but not a valid backend health endpoint: '{health_url}'. Details: {health_exc}"
                    )
                print(f"Dashboard ingest skipped due to health check failure: {health_exc}")
                sys.exit(0)

            response_body = None
            last_http_404 = None
            posted = False
            successful_endpoint = ""
            for ingest_path in ingest_path_candidates:
                endpoint = selected_base_url + ingest_path
                try:
                    req = urllib.request.Request(
                        endpoint,
                        data=json.dumps(payload).encode("utf-8"),
                        headers=base_headers,
                        method="POST",
                    )
                    for attempt in range(1, 4):
                        try:
                            with urllib.request.urlopen(req, timeout=30) as resp:
                                response_body = resp.read().decode("utf-8", errors="replace")
                                print(f"Scans ingest status: {getattr(resp, 'status', 'unknown')} via {endpoint} (attempt {attempt})")
                                print(response_body[:500])
                                posted = True
                                successful_endpoint = endpoint
                                break
                        except urllib.error.HTTPError as retry_http_exc:
                            if retry_http_exc.code == 404:
                                last_http_404 = retry_http_exc
                                raise
                            if attempt == 3:
                                raise
                            print(f"Ingest attempt {attempt} failed at {endpoint}: HTTP {retry_http_exc.code}. Retrying...")
                        except (urllib.error.URLError, TimeoutError) as retry_exc:
                            if attempt == 3:
                                raise retry_exc
                            print(f"Ingest attempt {attempt} failed at {endpoint}: {retry_exc}. Retrying...")
                    if posted:
                        break
                except urllib.error.HTTPError as endpoint_http_exc:
                    if endpoint_http_exc.code == 404:
                        print(f"Ingest endpoint not found at {endpoint}. Trying next endpoint candidate...")
                        continue
                    raise

            if not posted:
                if last_http_404 is not None and require_ingest:
                    raise SystemExit(
                        f"Dashboard backend responded 404 for all ingest endpoint candidates under '{selected_base_url}'. "
                        "Deploy latest backend code containing '/api/scans/ci-ingest' route."
                    )
                raise urllib.error.URLError("Unable to post ingest payload to any endpoint candidate")

            print(f"CI ingest succeeded for /scans via endpoint: {successful_endpoint}")
        except urllib.error.HTTPError as exc:
            body = ""
            try:
                body = exc.read().decode("utf-8", errors="replace")
            except Exception:
                body = "<no response body>"
            message = f"Dashboard ingest HTTP error: {exc.code} {exc.reason}. Body: {body[:1000]}"
            if require_ingest:
                raise SystemExit(message)
            print(message)
            sys.exit(0)
        except (urllib.error.URLError, TimeoutError) as exc:
            if require_ingest:
                raise SystemExit(
                    f"Dashboard ingest network error for endpoint '{endpoint}': {exc}. "
                    "Check DASHBOARD_URL DNS and backend availability."
                )
            print(f"Dashboard ingest skipped due to network error: {exc}")
            sys.exit(0)
        PY

    - name: Enforce gate
      shell: bash
      run: |
        set -euo pipefail

        REPORT="${{ steps.export.outputs.report_json_path }}"
        EXIT_CODE="${{ steps.run_pipeline.outputs.pipeline_exit_code }}"
        THRESHOLD="${{ inputs.risk-threshold }}"
        FAIL_CRIT="${{ inputs.fail-on-critical }}"

        SCORE=$(python -c "import json; print(float(json.load(open('$REPORT', encoding='utf-8')).get('overall_risk_score', 0) or 0))")
        CRITICAL=$(python -c "import json; print(int(json.load(open('$REPORT', encoding='utf-8')).get('summary', {}).get('critical_count', 0) or 0))")

        echo "Score: $SCORE"
        echo "Critical: $CRITICAL"

        if [ "$FAIL_CRIT" = "true" ] && [ "$CRITICAL" -gt 0 ]; then
          echo "Critical vulnerabilities found."
          exit 1
        fi

        if SCORE="$SCORE" THRESHOLD="$THRESHOLD" python -c "import os,sys; sys.exit(0 if float(os.environ['SCORE']) >= float(os.environ['THRESHOLD']) else 1)"; then
          echo "Risk score exceeded threshold."
          exit 1
        fi

        if [ "${EXIT_CODE:-0}" -ne 0 ]; then
          exit "$EXIT_CODE"
        fi

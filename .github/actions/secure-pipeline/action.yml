name: "Secure Pipeline Action"
description: "Runs the capci_cd security pipeline against the checked-out repository"

# grerg

inputs:
  python-version:
    required: false
    default: "3.9"

  target-path:
    required: false
    default: "."

  risk-threshold:
    required: false
    default: "80"

  fail-on-critical:
    required: false
    default: "true"

outputs:
  report-json-path:
    value: ${{ steps.export.outputs.report_json_path }}

runs:
  using: "composite"
  steps:

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        set -e
        pip install -r "${{ github.action_path }}/capci_cd/requirements.txt"

    - name: Run pipeline
      id: run_pipeline
      shell: bash
      working-directory: ${{ inputs.target-path }}
      run: |
        set +e
        python "${{ github.action_path }}/capci_cd/run_secure_pipeline.py"
        echo "pipeline_exit_code=$?" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Copy report
      id: export
      shell: bash
      run: |
        set -e
        mkdir -p "${{ github.workspace }}/security-reports"

        cp "${{ github.action_path }}/capci_cd/reports/report.json" \
           "${{ github.workspace }}/security-reports/report.json"

        echo "report_json_path=${{ github.workspace }}/security-reports/report.json" >> "$GITHUB_OUTPUT"

    - name: Enforce gate
      shell: bash
      run: |
        set -e

        REPORT="${{ steps.export.outputs.report_json_path }}"
        EXIT_CODE="${{ steps.run_pipeline.outputs.pipeline_exit_code }}"
        THRESHOLD="${{ inputs.risk-threshold }}"
        FAIL_CRIT="${{ inputs.fail-on-critical }}"

        SCORE=$(python -c "import json; print(json.load(open('$REPORT')).get('overall_risk_score', 0))")

        CRITICAL=$(python -c "import json; print(json.load(open('$REPORT')).get('summary', {}).get('critical_count', 0))")

        echo "Score: $SCORE"
        echo "Critical: $CRITICAL"

        if [ "$FAIL_CRIT" = "true" ] && [ "$CRITICAL" -gt 0 ]; then
          echo "Critical vulnerabilities found."
          exit 1
        fi

        if [ "$SCORE" -ge "$THRESHOLD" ]; then
          echo "Risk score exceeded threshold."
          exit 1
        fi

        if [ "$EXIT_CODE" -ne 0 ]; then
          exit "$EXIT_CODE"
        fi